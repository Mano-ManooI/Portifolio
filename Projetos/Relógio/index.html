<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="credits">
        <h3>By Mano-ManooI <img src="./img/Logo.webp"></h3>
    </div>
    <div class="container">
        <header>
            <h1>Relógio Digital</h1>
        </header>
        <main>
            <div class="clock">
                <h3 id="hours">00:</h3>
                <h3 class="info" id="infoHours">Horas</h3>
            </div>
            <div class="clock">
                <h3 id="minutes">00:</h3>
                <h3 class="info" id="infoMinutes">Minutos</h3>
            </div>
            <div class="clock">
                <h3 id="seconds">00</h3>
                <h3 class="info" id="infoSeconds">Segundos</h3>
            </div>
        </main>
    </div>    

    <script src="main.js"></script>
</body>
</html>
