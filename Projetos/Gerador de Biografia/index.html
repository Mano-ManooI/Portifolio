<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Gerador de Biografia</title>
</head>
<body>
    
    <div class="container">
        <header>
            <div id="mainHeader">
                <h3>By Mano-ManooI</h3>
                <img src="./img/Logo.webp">
            </div>
            <div id="menuProjects">
        </header>
        <main>
            <h1 id="title">Gerador de Biografia</h1>
            <div id="step1">
                <label>
                    <input type="text" placeholder="Ensira seu nome" id="name">
                    <input type="text" placeholder="Ensira sua idade" id="age">
                    <select id="genery">
                        <option value="" disabled selected>Gênero</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                    <p id="errorInfo"></p>
                    <button type="button" id="getValues">Escrever</button>
                </label>
            </div>
            <div id="step2">
                <h5 id="text"></h5>
                <div id="copyButtonLocation"></div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
