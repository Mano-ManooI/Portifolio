<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/style.css">
    <link rel="icon" href="./img/Logo Mano-ManooI.jpg" type="image/jpg">
    <title>Calculadora - ManooI</title>
</head>
<body>
    <main>
        <div id="shapes">
            <span id="grid"></span>
        </div>

        <div id="calculator">
            <div id="visor">
                <span id="dataVision">Vazio</span>
                <span id="visorText">0</span>
            </div>
            <div id="keyboard">
                <section>
                    <button class="style1">C</button>
                    <button class="style1">±</button>
                    <button class="style1">%</button>
                    <button class="style2">÷</button>
                </section>
                <section>
                    <button class="style1">7</button>
                    <button class="style1">8</button>
                    <button class="style1">9</button>
                    <button class="style2">x</button>
                </section>
                <section>
                    <button class="style1">4</button>
                    <button class="style1">5</button>
                    <button class="style1">6</button>
                    <button class="style2">-</button>
                </section>
                <section>
                    <button class="style1">1</button>
                    <button class="style1">2</button>
                    <button class="style1">3</button>
                    <button class="style2">+</button>
                </section>
                <section>
                    <button class="style1" value="0">0</button>
                    <button class="style1">.</button>
                    <button class="style2">=</button>
                </section>
            </div>
        </div>
    </main>

    <script src="./src/script.js"></script>
</body>
</html>
